<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Water Tracking - Fast Coach</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&amp;family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#c2c1ff",
                        "on-primary-container": "#004d1a",
                        "on-secondary-fixed-variant": "#004493",
                        "surface-container-low": "#f3f3f8",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#53e16f",
                        "on-background": "#1a1c1f",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#adc6ff",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#302aaf",
                        "on-surface": "#1a1c1f",
                        "surface-bright": "#f9f9fe",
                        "on-primary-fixed-variant": "#00531c",
                        "error": "#ba1a1a",
                        "primary-container": "#34c759",
                        "secondary": "#0058bc",
                        "surface-container-highest": "#e2e2e7",
                        "inverse-surface": "#2e3034",
                        "outline": "#6d7b6b",
                        "on-tertiary-fixed-variant": "#3631b4",
                        "tertiary-container": "#a6a5ff",
                        "surface-variant": "#e2e2e7",
                        "surface-container": "#ededf2",
                        "on-surface-variant": "#3d4a3c",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#fefcff",
                        "primary": "#006e28",
                        "tertiary": "#4f4ccd",
                        "secondary-container": "#0070eb",
                        "on-tertiary-fixed": "#0c006a",
                        "surface-container-high": "#e8e8ed",
                        "primary-fixed": "#72fe88",
                        "surface-dim": "#d9dade",
                        "outline-variant": "#bccbb8",
                        "on-primary-fixed": "#002107",
                        "tertiary-fixed": "#e2dfff",
                        "background": "#f9f9fe",
                        "inverse-on-surface": "#f0f0f5",
                        "surface": "#f9f9fe",
                        "on-secondary-fixed": "#001a41",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#53e16f",
                        "secondary-fixed": "#d8e2ff",
                        "surface-tint": "#006e28"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "glass-padding": "20px",
                        "stack-gap-lg": "40px",
                        "container-padding": "24px",
                        "stack-gap-sm": "12px",
                        "unit": "4px",
                        "stack-gap-md": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "body-lg": ["17px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "300"}],
                        "label-caps": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.08em", "fontWeight": "600"}],
                        "body-md": ["15px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "display-lg": ["44px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.4);
        }
        
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-[120px] pt-[80px] antialiased">
<!-- Layer 0: Background Elements -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[40%] rounded-full bg-secondary-fixed opacity-30 blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary-fixed opacity-20 blur-[100px]"></div>
</div>
<!-- TopAppBar JSON execution -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl dark:bg-surface-dim/80 shadow-sm flex justify-between items-center h-16 px-container-padding">
<button class="text-on-surface-variant hover:opacity-70 transition-opacity active:scale-95 duration-200 p-2 -ml-2 rounded-full">
<span class="material-symbols-outlined">history</span>
</button>
<h1 class="font-headline-lg text-headline-lg font-extrabold tracking-tight text-on-surface dark:text-on-surface-variant">
            Fast Coach
        </h1>
<button class="text-on-surface-variant hover:opacity-70 transition-opacity active:scale-95 duration-200 p-2 -mr-2 rounded-full">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="max-w-2xl mx-auto px-container-padding flex flex-col gap-stack-gap-lg">
<!-- Hydration Progress -->
<section class="flex flex-col items-center justify-center pt-stack-gap-md">
<div class="relative w-64 h-64 flex items-center justify-center mb-stack-gap-sm">
<!-- SVG Progress Ring -->
<svg class="absolute inset-0 w-full h-full drop-shadow-[0_10px_20px_rgba(0,112,235,0.1)]" viewbox="0 0 120 120">
<circle class="text-surface-container-high" cx="60" cy="60" fill="transparent" r="54" stroke="currentColor" stroke-width="6"></circle>
<!-- stroke-dasharray = 2 * pi * r = ~339.29 -->
<!-- stroke-dashoffset = 339.29 - (339.29 * percentage / 100) -->
<!-- For 65% = ~118.75 -->
<circle class="text-secondary-container progress-ring__circle" cx="60" cy="60" fill="transparent" r="54" stroke="currentColor" stroke-dasharray="339.29" stroke-dashoffset="118.75" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="flex flex-col items-center text-center z-10">
<span class="font-display-lg text-display-lg text-on-background mb-1">65<span class="text-headline-md">%</span></span>
<span class="font-body-md text-body-md text-on-surface-variant">1,300 / 2,000 ml</span>
</div>
</div>
<p class="font-body-lg text-body-lg text-on-surface-variant text-center max-w-xs">
                You're on track! Keep hydrating to reach your daily goal.
            </p>
</section>
<!-- Quick Presets Grid -->
<section class="flex flex-col gap-stack-gap-sm">
<h2 class="font-headline-md text-headline-md text-on-background px-unit">Quick Add</h2>
<div class="grid grid-cols-3 gap-stack-gap-sm">
<!-- Preset: Glass -->
<button class="glass-panel rounded-xl p-glass-padding flex flex-col items-center justify-center gap-2 hover:bg-surface-container-highest/50 active:scale-95 transition-all duration-200">
<div class="w-12 h-12 rounded-full bg-secondary-fixed flex items-center justify-center text-on-secondary-fixed">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<div class="flex flex-col items-center">
<span class="font-body-md text-body-md text-on-background">Glass</span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-1">250 ml</span>
</div>
</button>
<!-- Preset: Bottle -->
<button class="glass-panel rounded-xl p-glass-padding flex flex-col items-center justify-center gap-2 hover:bg-surface-container-highest/50 active:scale-95 transition-all duration-200">
<div class="w-12 h-12 rounded-full bg-secondary-fixed flex items-center justify-center text-on-secondary-fixed">
<span class="material-symbols-outlined">water_bottle</span>
</div>
<div class="flex flex-col items-center">
<span class="font-body-md text-body-md text-on-background">Bottle</span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-1">500 ml</span>
</div>
</button>
<!-- Preset: Mug -->
<button class="glass-panel rounded-xl p-glass-padding flex flex-col items-center justify-center gap-2 hover:bg-surface-container-highest/50 active:scale-95 transition-all duration-200">
<div class="w-12 h-12 rounded-full bg-secondary-fixed flex items-center justify-center text-on-secondary-fixed">
<span class="material-symbols-outlined">coffee</span>
</div>
<div class="flex flex-col items-center">
<span class="font-body-md text-body-md text-on-background">Mug</span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-1">350 ml</span>
</div>
</button>
</div>
<button class="w-full mt-2 py-4 px-6 bg-secondary-container text-on-secondary-container font-headline-md text-headline-md rounded-full shadow-[0_10px_20px_rgba(0,112,235,0.2)] hover:opacity-90 active:scale-[0.98] transition-all">
                Custom Entry
            </button>
</section>
<!-- Today's Log -->
<section class="flex flex-col gap-stack-gap-sm mb-stack-gap-lg">
<div class="flex justify-between items-baseline px-unit">
<h2 class="font-headline-md text-headline-md text-on-background">Today's Log</h2>
<button class="font-body-md text-body-md text-secondary font-semibold">Edit</button>
</div>
<div class="glass-panel rounded-lg flex flex-col divide-y divide-surface-container-highest/50">
<!-- Log Item 1 -->
<div class="p-glass-padding flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-secondary-fixed/50 flex items-center justify-center text-on-secondary-fixed">
<span class="material-symbols-outlined" style="font-size: 20px;">water_bottle</span>
</div>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-background font-medium">Bottle</span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-1">1:45 PM</span>
</div>
</div>
<span class="font-headline-md text-headline-md text-on-background">500 ml</span>
</div>
<!-- Log Item 2 -->
<div class="p-glass-padding flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-secondary-fixed/50 flex items-center justify-center text-on-secondary-fixed">
<span class="material-symbols-outlined" style="font-size: 20px;">water_drop</span>
</div>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-background font-medium">Glass</span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-1">10:30 AM</span>
</div>
</div>
<span class="font-headline-md text-headline-md text-on-background">250 ml</span>
</div>
<!-- Log Item 3 -->
<div class="p-glass-padding flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-secondary-fixed/50 flex items-center justify-center text-on-secondary-fixed">
<span class="material-symbols-outlined" style="font-size: 20px;">coffee</span>
</div>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-background font-medium">Mug</span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-1">8:00 AM</span>
</div>
</div>
<span class="font-headline-md text-headline-md text-on-background">350 ml</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar JSON execution - Target Active: Water -->
<nav class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] rounded-xl z-50 bg-surface-container-lowest/70 backdrop-blur-2xl dark:bg-inverse-surface/80 border border-white/40 dark:border-outline-variant/10 shadow-[0_10px_20px_rgba(0,0,0,0.05)] flex justify-around items-center py-stack-gap-sm px-4">
<!-- Fast (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-6 py-2 hover:bg-surface-container-high/50 dark:hover:bg-surface-variant/20 transition-all active:scale-90 duration-150 rounded-full">
<span class="material-symbols-outlined mb-1">timer</span>
<span class="font-label-caps text-label-caps">Fast</span>
</button>
<!-- Water (Active) -->
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed bg-primary-fixed/20 dark:bg-primary-fixed-dim/20 rounded-full px-6 py-2 shadow-[0_0_15px_rgba(83,225,111,0.3)] hover:bg-surface-container-high/50 dark:hover:bg-surface-variant/20 transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">water_drop</span>
<span class="font-label-caps text-label-caps">Water</span>
</button>
<!-- Facts (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-6 py-2 hover:bg-surface-container-high/50 dark:hover:bg-surface-variant/20 transition-all active:scale-90 duration-150 rounded-full">
<span class="material-symbols-outlined mb-1">lightbulb</span>
<span class="font-label-caps text-label-caps">Facts</span>
</button>
</nav>
</body></html>
