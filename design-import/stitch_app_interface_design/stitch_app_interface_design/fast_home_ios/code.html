<style>
        body {
            background: linear-gradient(135deg, #f9f9fe 0%, #ededf2 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        .timer-ring {
            background: conic-gradient(from 180deg, #53e16f 0%, #53e16f 65%, rgba(83, 225, 111, 0.1) 65%, rgba(83, 225, 111, 0.1) 100%);
            border-radius: 50%;
            position: relative;
        }

        .timer-ring::before {
            content: '';
            position: absolute;
            inset: 8px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.02);
        }
        
        .floating-action {
            box-shadow: 0 10px 20px rgba(83, 225, 111, 0.2);
        }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="text-on-surface pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl dark:bg-surface-dim/80 border-b border-white/40 dark:border-outline-variant/20 shadow-sm flex justify-between items-center h-16 px-container-padding transition-all">
<button class="text-on-surface-variant hover:opacity-70 transition-opacity active:scale-95 duration-200">

</button>
<h1 class="font-headline-lg text-headline-lg font-extrabold tracking-tight text-on-surface dark:text-on-surface-variant">Fast Coach</h1>

</button>
</header>

<div class="relative z-10 flex flex-col items-center">
<span class="font-label-caps text-label-caps text-outline uppercase tracking-widest mb-2">Elapsed Time</span>

</div>
</div>
<button class="mt-8 bg-primary text-on-primary font-headline-md text-headline-md rounded-full px-10 py-4 floating-action active:scale-95 transition-transform">
                End Fast
            </button>
</section>
<!-- Current Phase Card -->
<section>
<div class="glass-card rounded-xl p-glass-padding flex items-start gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">recycling</span>
</div>
<div>
<div class="flex items-center gap-2 mb-1">
<span class="font-label-caps text-label-caps bg-primary/10 text-primary px-3 py-1 rounded-full uppercase tracking-wider">Current Phase</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-2">Autophagy</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Your body is currently cleaning out damaged cells and regenerating newer, healthier ones. Peak fat burning is active.</p>
</div>
</div>
</section>

</div>
