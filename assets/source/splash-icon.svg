<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Splash mark: just the leaf+ring on a transparent canvas, centered. Container provides the bg. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#53e16f"/>
      <stop offset="1" stop-color="#006e28"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <!-- Soft rounded green mark: smaller than full canvas to leave breathing room around the splash bg -->
  <rect x="232" y="232" width="560" height="560" rx="140" ry="140" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="184" fill="none" stroke="#ffffff" stroke-opacity="0.24" stroke-width="36"/>
  <path d="M 512 328 A 184 184 0 1 1 328 512" fill="none" stroke="url(#ring)" stroke-width="36" stroke-linecap="round"/>
  <g transform="translate(512 512) scale(7.6) translate(-12 -12)" fill="#ffffff">
    <path d="M9.5 18c6.218 0 10.5 -3.288 11 -12v-2h-4.014c-9 0 -11.986 4 -12 9c0 1 0 3 2 5h3z" stroke="none"/>
    <path d="M5 21c.5 -4.5 2.5 -8 7 -10" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  </g>
</svg>
