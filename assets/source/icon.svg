<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Fast Coach launcher icon: hourglass-on-green for the fasting timer brand. -->
  <!-- Hourglass glyph is Phosphor 'hourglass-medium' (MIT) recolored white. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#53e16f"/>
      <stop offset="1" stop-color="#006e28"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <!-- Faint track ring at low opacity -->
  <circle cx="512" cy="512" r="312" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="56"/>
  <!-- 75% progress arc, starting at 12 o'clock, clockwise -->
  <path d="M 512 200 A 312 312 0 1 1 200 512" fill="none" stroke="url(#ring)" stroke-width="56" stroke-linecap="round"/>
  <!-- Phosphor hourglass-medium (MIT) — scaled to ~360px, centered -->
  <g transform="translate(512 512) scale(1.41) translate(-128 -128)" fill="#ffffff">
    <path d="M204 75.64V40a20 20 0 0 0-20-20H72a20 20 0 0 0-20 20v36a20.1 20.1 0 0 0 8 16l48 36l-48 36a20.1 20.1 0 0 0-8 16v36a20 20 0 0 0 20 20h112a20 20 0 0 0 20-20v-35.64a20.13 20.13 0 0 0-7.94-16L147.9 128l48.16-36.4A20.13 20.13 0 0 0 204 75.64M180 44v28H76V44Zm-52 69l-22.67-17h45.1Zm52 99H76v-30l40-30v16a12 12 0 0 0 24 0v-15.89l40 30.24Z"/>
  </g>
</svg>
